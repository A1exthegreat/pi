name: Upstream Triage

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: upstream-triage
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/badlogic/pi-mono.git 2>/dev/null || true

      - name: Run upstream triage
        env:
          OPENAI_BASE_URL: ${{ secrets.USTC_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.USTC_API_KEY }}
          AI_MODEL: ${{ 'deepseek-v4-flash' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/upstream-sync/triage.mjs

      - name: Commit baseline update
        run: |
          git add .github/upstream-sync/processed-commits.txt
          git diff --staged --quiet || git commit -m "chore: update upstream triage baseline"
          git push
